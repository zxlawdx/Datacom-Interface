<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OLT SSH Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white p-6">

  <div class="max-w-2xl mx-auto space-y-4">

    <h1 class="text-2xl font-bold">OLT SSH Panel</h1>

    <input id="host" placeholder="IP da OLT" class="w-full p-2 text-black rounded">
    <input id="port" placeholder="Porta (opcional)" class="w-full p-2 text-black rounded">
    <input id="user" placeholder="Usuário SSH" class="w-full p-2 text-black rounded">
    <input id="password" type="password" placeholder="Senha" class="w-full p-2 text-black rounded">

    <input id="command" placeholder="Comando (ex: show onu)" class="w-full p-2 text-black rounded">

    <button onclick="sendCommand()" class="bg-blue-600 px-4 py-2 rounded">
      Executar
    </button>

    <pre id="output" class="bg-black p-4 rounded h-64 overflow-auto"></pre>

  </div>

<script>
async function sendCommand() {
    const res = await fetch("http://127.0.0.1:8000/ssh/run", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            host: document.getElementById("host").value,
            port: document.getElementById("port").value || 22,
            user: document.getElementById("user").value,
            password: document.getElementById("password").value,
            command: document.getElementById("command").value
        })
    });

    const data = await res.json();

    document.getElementById("output").innerText =
        "OUTPUT:\n" + data.output + "\n\nERROR:\n" + data.error;
}
</script>

</body>
</html>
