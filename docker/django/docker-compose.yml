version: "3.9"

services:
  web:
    build:
      context: ../../
      dockerfile: docker/django/Dockerfile
    container_name: django_app
    volumes:
        # Caminho corrigido para bater com o WORKDIR /app do Dockerfile
        - static_volume:/app/staticfiles
        - media_volume:/app/mediafiles
    expose:
      - "8000"

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Nginx também deve ler da pasta /app/staticfiles
      - static_volume:/app/staticfiles
      - media_volume:/app/mediafiles
    depends_on:
      - web

volumes:
  static_volume:
  media_volume:
